name: Translate site
on:
  push:
    branches: [main]
    paths:
      - "**.html"

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install deep-translator

      - name: Get changed HTML files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.html' | grep -v '^en/' | grep -v '^nl/' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Fichiers modifiés : $FILES"

      - name: Run translation script
        run: python translate.py ${{ steps.changed.outputs.files }}

      - name: Commit translated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add en/ nl/
          git stash
          git pull --rebase origin main
          git stash pop
          git add en/ nl/
          git diff --staged --quiet || git commit -m "chore: auto-translate [skip ci]"
          git push
